name: Keep Alive

on:
  schedule:
    - cron: '*/10 * * * *'  # a cada 10 minutos
  workflow_dispatch:         # permite executar manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Hostel Anprado
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://hostel-anprado.onrender.com/api/me
